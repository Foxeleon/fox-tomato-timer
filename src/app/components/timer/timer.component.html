<div class="timer">
  <h2 class="mat-display-4">{{ formatDurationMmSs(timerStore.remainingMs()) }}</h2>
  <div
    class="active-task-display"
    style="text-align: center; margin-top: 1rem; margin-bottom: 1rem"
  >
    @if (activeTask(); as task) {
      <p style="font-size: 1.2rem; margin: 0">
        Working on: <strong>{{ task.title }}</strong>
      </p>
    } @else {
      <p style="font-size: 1rem; color: gray; margin: 0"><em>No active task</em></p>
    }
  </div>
  <div class="controls">
    <button
      mat-fab
      color="primary"
      (click)="toggleTimer()"
      [disabled]="
        (!activeTask() && !isTaskInputActive()) ||
        (!activeTask() && timerStore.baseDurationMs() <= 0)
      "
      [class.is-paused]="timerStore.status() === 'running'"
    >
      <mat-icon>{{ timerStore.status() === 'running' ? 'pause' : 'play_arrow' }}</mat-icon>
    </button>
    <button mat-fab color="warn" (click)="stopTimer()">
      <mat-icon>stop</mat-icon>
    </button>
    <button mat-fab color="warn" (click)="resetTimer()">
      <mat-icon>replay</mat-icon>
    </button>
  </div>
</div>
